app:
  name: gin-scaffold
  version: 1.0.0
  env: development

server:
  port: 8080                  # HTTP 监听端口
  read_timeout: 10s           # 读取超时
  write_timeout: 10s          # 写入超时

db:
  driver: mysql
  host: localhost
  port: 13306              # 本地开发端口；Docker 容器内用 mysql:3306（见 docker-compose）
  user: root
  password: ${DB_PASSWORD}
  db_name: gin_scaffold
  charset: utf8mb4
  max_open: 100               # 最大打开连接数
  max_idle: 10                # 最大空闲连接数

redis:
  host: localhost
  port: 16379              # 本地开发端口；Docker 容器内用 redis:6379（见 docker-compose）
  password: ${REDIS_PASSWORD}
  db: 0

jwt:
  secret: ${JWT_SECRET}
  access_expire: 15m          # Access Token 有效期
  refresh_expire: 168h        # Refresh Token 有效期 (7天)
  issuer: gin-scaffold

casbin:
  model_path: config/rbac_model.conf
  policy_path: config/policy.csv

rate_limit:
  rate: 100                   # 每秒允许的请求数
  burst: 200                  # 突发上限

email:
  host: smtp.qq.com
  port: 465
  username: your-email@qq.com
  password: ${EMAIL_PASSWORD}
  from_name: Gin Scaffold

log:
  level: info
  filename: logs/app.log
  max_size: 100               # 单个日志文件最大大小 (MB)
  max_backups: 30             # 保留的旧日志文件数量
  max_age: 7                  # 日志文件保留天数
  compress: true              # 是否压缩归档

upload:
  save_dir: storage/avatars   # 头像文件存储目录
  max_size_mb: 5              # 最大文件大小 (MB)
  allowed_exts:               # 允许的文件扩展名
    - jpg
    - jpeg
    - png
    - gif
    - webp
