app:
  name: gin-scaffold
  version: 1.0.0
  env: development

server:
  port: ":8080"
  read_timeout: 10s
  write_timeout: 10s

db:
  driver: mysql
  host: localhost
  port: 3306
  user: root
  password: ${DB_PASSWORD}
  db_name: gin_scaffold
  charset: utf8mb4
  max_open: 100
  max_idle: 10

redis:
  host: localhost
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0

jwt:
  secret: ${JWT_SECRET}
  access_expire: 15m
  refresh_expire: 168h
  issuer: gin-scaffold

casbin:
  model_path: config/rbac_model.conf

rate_limit:
  rate: 100
  burst: 200

email:
  host: smtp.qq.com
  port: 465
  username: your-email@qq.com
  password: ${EMAIL_PASSWORD}
  from_name: Gin Scaffold

log:
  level: info
  filename: logs/app.log
  max_size: 100
  max_backups: 30
  max_age: 7
  compress: true
